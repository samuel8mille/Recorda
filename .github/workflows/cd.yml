name: CD — Firebase App Distribution

on:
  push:
    tags:
      - 'v*'

jobs:
  distribute:
    name: Distribute to testers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > "$RUNNER_TEMP/recorda-release.jks"
      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_name }}
          KEYSTORE_PATH: ${{ runner.temp }}/recorda-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Distribute via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1060444013204:android:02e5ae41b0c22a0180aa81
          token: ${{ secrets.FIREBASE_TOKEN }}
          releaseNotes: "Build ${{ github.ref_name }} — ${{ github.sha }}"
          file: app/build/outputs/apk/release/app-release.apk
