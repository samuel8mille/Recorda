sonar.projectKey=samuel8mille_Recorda
sonar.organization=samuel8mille
sonar.host.url=https://sonarcloud.io

sonar.sources=app/src/main
sonar.tests=app/src/test,app/src/androidTest

# Exclusões: classes geradas pelo Android e código inerentemente difícil de unit testar
sonar.exclusions=\
  **/R.class,\
  **/R$*.class,\
  **/BuildConfig.*,\
  **/Manifest*.*,\
  **/di/**,\
  **/*Activity.kt,\
  **/*Application.kt,\
  **/preview/**,\
  **/dto/**,\
  **/theme/**

sonar.coverage.jacoco.xmlReportPaths=app/build/reports/coverage/test/debug/report.xml
sonar.java.binaries=app/build/intermediates/javac/debug/classes,app/build/tmp/kotlin-classes/debug

# Use the JRE already installed on the runner instead of downloading from scanner.sonarcloud.io
sonar.scanner.skipJreProvisioning=true
